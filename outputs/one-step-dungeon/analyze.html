<!DOCTYPE html>
<html>
<body>
<canvas id="c"></canvas>
<pre id="out"></pre>
<script>
const img = new Image();
img.onload = function() {
  const c = document.getElementById('c');
  c.width = img.width; c.height = img.height;
  const ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0);
  const d = ctx.getImageData(0,0,img.width,img.height).data;
  const W = img.width, H = img.height;
  let minX=W,maxX=0,minY=H,maxY=0;
  for(let y=0;y<H;y++) for(let x=0;x<W;x++){
    const i=(y*W+x)*4;
    const r=d[i],g=d[i+1],b=d[i+2],a=d[i+3];
    if(a>10&&!(r>240&&g>240&&b>240)){
      if(x<minX)minX=x;if(x>maxX)maxX=x;
      if(y<minY)minY=y;if(y>maxY)maxY=y;
    }
  }
  let out = 'bbox: '+minX+'-'+maxX+', '+minY+'-'+maxY+'\n';
  out += 'size: '+(maxX-minX+1)+'x'+(maxY-minY+1)+'\n\n';
  const colorMap = {};
  for(let y=minY;y<=maxY;y++){
    let row = (y-minY).toString().padStart(2)+': ';
    for(let x=minX;x<=maxX;x++){
      const i=(y*W+x)*4;
      const r=d[i],g=d[i+1],b=d[i+2],a=d[i+3];
      if(a<10||(r>240&&g>240&&b>240)){row+='.';continue;}
      const hex='#'+r.toString(16).padStart(2,'0')+g.toString(16).padStart(2,'0')+b.toString(16).padStart(2,'0');
      colorMap[hex]=(colorMap[hex]||0)+1;
      row+='X';
    }
    out += row + '\n';
  }
  out += '\nColors:\n';
  Object.entries(colorMap).sort((a,b)=>b[1]-a[1]).forEach(([c,n])=>{out+=c+': '+n+'\n';});
  document.getElementById('out').textContent = out;
};
img.src = 'mother_char.png';
</script>
</body>
</html>
